<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 160" width="830" height="160" overflow="hidden">
  <defs>
    <clipPath id="clip"><rect width="830" height="160"/></clipPath>
    <style>
      @keyframes h1 { from { transform: translateX(-240px); } to { transform: translateX(950px); } }
      @keyframes h2 { from { transform: translateX(-240px); } to { transform: translateX(950px); } }
      @keyframes fa { 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
      @keyframes fb { 0%,49%{ opacity:0; } 50%,100%{ opacity:1; } }
      .run1 { animation: h1  8s        linear infinite; }
      .run2 { animation: h2 13s -5.2s  linear infinite; }
      .fa   { animation: fa 0.28s steps(1)        infinite; }
      .fb   { animation: fb 0.28s steps(1)        infinite; }
      .fa2  { animation: fa 0.28s 0.14s steps(1)  infinite; }
      .fb2  { animation: fb 0.28s 0.14s steps(1)  infinite; }
    </style>
  </defs>

  <g clip-path="url(#clip)">

    <!-- background -->
    <rect width="830" height="160" fill="#0d0e1a"/>

    <!-- stars -->
    <circle cx="55"  cy="11" r="1"   fill="#c0caf5" opacity="0.40"/>
    <circle cx="185" cy="27" r="0.8" fill="#c0caf5" opacity="0.25"/>
    <circle cx="315" cy="8"  r="1.2" fill="#c0caf5" opacity="0.35"/>
    <circle cx="465" cy="21" r="0.8" fill="#c0caf5" opacity="0.28"/>
    <circle cx="595" cy="10" r="1"   fill="#c0caf5" opacity="0.38"/>
    <circle cx="745" cy="32" r="0.8" fill="#c0caf5" opacity="0.20"/>
    <circle cx="125" cy="47" r="0.6" fill="#c0caf5" opacity="0.15"/>
    <circle cx="395" cy="43" r="0.7" fill="#c0caf5" opacity="0.18"/>
    <circle cx="685" cy="40" r="0.6" fill="#c0caf5" opacity="0.15"/>

    <!-- ground -->
    <rect x="0" y="140" width="830" height="20" fill="#0b0c17"/>
    <rect x="0" y="140" width="830" height="1"  fill="#414868"/>

    <!-- ── HORSE 1  blue, main, full size ── -->
    <g class="run1">
      <g transform="translate(0,23)"
         font-family="'Courier New',Courier,monospace"
         font-size="8"
         fill="#7AA2F7">

        <!-- body rows 0-8  (always visible) -->
        <text x="0" y="0"  xml:space="preserve">                      ## ##</text>
        <text x="0" y="9"  xml:space="preserve">                  ########</text>
        <text x="0" y="18" xml:space="preserve">              ##  ########</text>
        <text x="0" y="27" xml:space="preserve">##            ###########</text>
        <text x="0" y="36" xml:space="preserve">### ##  ##################</text>
        <text x="0" y="45" xml:space="preserve">### ###  #################</text>
        <text x="0" y="54" xml:space="preserve"> ## ####  ################</text>
        <text x="0" y="63" xml:space="preserve">  # ######################</text>
        <text x="0" y="72" xml:space="preserve">    ######################</text>

        <!-- frame A legs -->
        <g class="fa">
          <text x="0" y="81"  xml:space="preserve">      ##       ##</text>
          <text x="0" y="90"  xml:space="preserve">     ###       ###</text>
          <text x="0" y="99"  xml:space="preserve">    ###        ###</text>
          <text x="0" y="108" xml:space="preserve">   ####         ##</text>
          <text x="0" y="117" xml:space="preserve">   ###          ##</text>
        </g>

        <!-- frame B legs -->
        <g class="fb">
          <text x="0" y="81"  xml:space="preserve">       ##      ##</text>
          <text x="0" y="90"  xml:space="preserve">       ###     ###</text>
          <text x="0" y="99"  xml:space="preserve">       ###    ###</text>
          <text x="0" y="108" xml:space="preserve">        ##   ####</text>
          <text x="0" y="117" xml:space="preserve">        ##   ###</text>
        </g>
      </g>
    </g>

    <!-- ── HORSE 2  purple, smaller/distant ── -->
    <g class="run2">
      <g transform="translate(0,62)"
         font-family="'Courier New',Courier,monospace"
         font-size="5"
         fill="#bb9af7"
         opacity="0.55">

        <!-- body -->
        <text x="0" y="0"  xml:space="preserve">                      ## ##</text>
        <text x="0" y="6"  xml:space="preserve">                  ########</text>
        <text x="0" y="12" xml:space="preserve">              ##  ########</text>
        <text x="0" y="18" xml:space="preserve">##            ###########</text>
        <text x="0" y="24" xml:space="preserve">### ##  ##################</text>
        <text x="0" y="30" xml:space="preserve">### ###  #################</text>
        <text x="0" y="36" xml:space="preserve"> ## ####  ################</text>
        <text x="0" y="42" xml:space="preserve">  # ######################</text>
        <text x="0" y="48" xml:space="preserve">    ######################</text>

        <!-- frame A2 legs -->
        <g class="fa2">
          <text x="0" y="54" xml:space="preserve">      ##       ##</text>
          <text x="0" y="60" xml:space="preserve">     ###       ###</text>
          <text x="0" y="66" xml:space="preserve">    ###        ###</text>
          <text x="0" y="72" xml:space="preserve">   ####         ##</text>
          <text x="0" y="78" xml:space="preserve">   ###          ##</text>
        </g>

        <!-- frame B2 legs -->
        <g class="fb2">
          <text x="0" y="54" xml:space="preserve">       ##      ##</text>
          <text x="0" y="60" xml:space="preserve">       ###     ###</text>
          <text x="0" y="66" xml:space="preserve">       ###    ###</text>
          <text x="0" y="72" xml:space="preserve">        ##   ####</text>
          <text x="0" y="78" xml:space="preserve">        ##   ###</text>
        </g>
      </g>
    </g>

  </g>
</svg>
