<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 160" width="830" height="160" overflow="hidden">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0e1a"/>
      <stop offset="100%" stop-color="#1a1b2e"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="830" height="160"/>
    </clipPath>
    <style>
      @keyframes h1 { from { transform: translateX(-200px); } to { transform: translateX(1000px); } }
      @keyframes h2 { from { transform: translateX(-200px); } to { transform: translateX(1000px); } }
      @keyframes h3 { from { transform: translateX(-200px); } to { transform: translateX(1000px); } }
      @keyframes legA { 0%,49%{ opacity:1; } 50%,100%{ opacity:0; } }
      @keyframes legB { 0%,49%{ opacity:0; } 50%,100%{ opacity:1; } }
      .r1 { animation: h1 7s linear infinite; }
      .r2 { animation: h2 10s -4.5s linear infinite; }
      .r3 { animation: h3 13s -8s linear infinite; }
      .la { animation: legA 0.32s steps(1) infinite; }
      .lb { animation: legB 0.32s steps(1) infinite; }
      .la2 { animation: legB 0.32s steps(1) infinite; }
      .lb2 { animation: legA 0.32s steps(1) infinite; }
    </style>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Sky -->
    <rect width="830" height="160" fill="url(#sky)"/>

    <!-- Stars -->
    <circle cx="60"  cy="14" r="1"   fill="#c0caf5" opacity="0.35"/>
    <circle cx="190" cy="30" r="0.8" fill="#c0caf5" opacity="0.25"/>
    <circle cx="320" cy="10" r="1.2" fill="#c0caf5" opacity="0.4"/>
    <circle cx="480" cy="24" r="0.8" fill="#c0caf5" opacity="0.28"/>
    <circle cx="610" cy="13" r="1"   fill="#c0caf5" opacity="0.33"/>
    <circle cx="760" cy="36" r="0.8" fill="#c0caf5" opacity="0.2"/>
    <circle cx="130" cy="50" r="0.7" fill="#c0caf5" opacity="0.15"/>
    <circle cx="420" cy="46" r="0.6" fill="#c0caf5" opacity="0.18"/>
    <circle cx="700" cy="44" r="0.7" fill="#c0caf5" opacity="0.15"/>

    <!-- Ground -->
    <rect x="0" y="136" width="830" height="24" fill="#0d0e1a"/>
    <rect x="0" y="136" width="830" height="1.5" fill="#414868"/>

    <!-- ── HORSE 1 — blue, foreground, full size ── -->
    <g class="r1">
      <g transform="translate(0,136)">
        <!-- body -->
        <ellipse cx="0"   cy="-48" rx="40" ry="20" fill="#7AA2F7"/>
        <ellipse cx="-30" cy="-54" rx="16" ry="12" fill="#7AA2F7"/>
        <ellipse cx="22"  cy="-56" rx="13" ry="11" fill="#7AA2F7"/>
        <!-- neck -->
        <polygon points="16,-40 30,-38 36,-66 20,-64" fill="#7AA2F7"/>
        <!-- head -->
        <ellipse cx="44" cy="-72" rx="17" ry="11" fill="#7AA2F7" transform="rotate(-15,44,-72)"/>
        <!-- muzzle -->
        <ellipse cx="58" cy="-66" rx="10" ry="7" fill="#7AA2F7"/>
        <!-- ear -->
        <polygon points="34,-80 37,-91 42,-80" fill="#7AA2F7"/>
        <!-- eye -->
        <circle cx="50" cy="-74" r="2.5" fill="#0d0e1a"/>
        <!-- tail -->
        <path d="M-42,-50 C-60,-38 -64,-22 -57,0" stroke="#7AA2F7" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- legs A -->
        <g class="la">
          <rect x="8"   y="-30" width="7" height="30" rx="3" transform="rotate(-24,11,-30)"  fill="#7AA2F7"/>
          <rect x="-1"  y="-30" width="7" height="30" rx="3" transform="rotate(-10,2,-30)"   fill="#7AA2F7" opacity="0.65"/>
          <rect x="-28" y="-28" width="7" height="30" rx="3" transform="rotate(24,-25,-28)"  fill="#7AA2F7"/>
          <rect x="-20" y="-28" width="7" height="30" rx="3" transform="rotate(10,-17,-28)"  fill="#7AA2F7" opacity="0.65"/>
        </g>
        <!-- legs B -->
        <g class="lb">
          <rect x="8"   y="-30" width="7" height="30" rx="3" transform="rotate(14,11,-30)"   fill="#7AA2F7"/>
          <rect x="-1"  y="-30" width="7" height="30" rx="3" transform="rotate(24,2,-30)"    fill="#7AA2F7" opacity="0.65"/>
          <rect x="-28" y="-28" width="7" height="30" rx="3" transform="rotate(-14,-25,-28)" fill="#7AA2F7"/>
          <rect x="-20" y="-28" width="7" height="30" rx="3" transform="rotate(-24,-17,-28)" fill="#7AA2F7" opacity="0.65"/>
        </g>
      </g>
    </g>

    <!-- ── HORSE 2 — purple, mid-ground, 80% size ── -->
    <g class="r2">
      <g transform="translate(0,136) scale(0.8)">
        <ellipse cx="0"   cy="-48" rx="40" ry="20" fill="#bb9af7" opacity="0.8"/>
        <ellipse cx="-30" cy="-54" rx="16" ry="12" fill="#bb9af7" opacity="0.8"/>
        <ellipse cx="22"  cy="-56" rx="13" ry="11" fill="#bb9af7" opacity="0.8"/>
        <polygon points="16,-40 30,-38 36,-66 20,-64" fill="#bb9af7" opacity="0.8"/>
        <ellipse cx="44" cy="-72" rx="17" ry="11" fill="#bb9af7" opacity="0.8" transform="rotate(-15,44,-72)"/>
        <ellipse cx="58" cy="-66" rx="10" ry="7"  fill="#bb9af7" opacity="0.75"/>
        <polygon points="34,-80 37,-91 42,-80" fill="#bb9af7" opacity="0.8"/>
        <circle cx="50" cy="-74" r="2.5" fill="#0d0e1a"/>
        <path d="M-42,-50 C-60,-38 -64,-22 -57,0" stroke="#bb9af7" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.75"/>
        <g class="la2">
          <rect x="8"   y="-30" width="7" height="30" rx="3" transform="rotate(-24,11,-30)"  fill="#bb9af7" opacity="0.8"/>
          <rect x="-1"  y="-30" width="7" height="30" rx="3" transform="rotate(-10,2,-30)"   fill="#bb9af7" opacity="0.55"/>
          <rect x="-28" y="-28" width="7" height="30" rx="3" transform="rotate(24,-25,-28)"  fill="#bb9af7" opacity="0.8"/>
          <rect x="-20" y="-28" width="7" height="30" rx="3" transform="rotate(10,-17,-28)"  fill="#bb9af7" opacity="0.55"/>
        </g>
        <g class="lb2">
          <rect x="8"   y="-30" width="7" height="30" rx="3" transform="rotate(14,11,-30)"   fill="#bb9af7" opacity="0.8"/>
          <rect x="-1"  y="-30" width="7" height="30" rx="3" transform="rotate(24,2,-30)"    fill="#bb9af7" opacity="0.55"/>
          <rect x="-28" y="-28" width="7" height="30" rx="3" transform="rotate(-14,-25,-28)" fill="#bb9af7" opacity="0.8"/>
          <rect x="-20" y="-28" width="7" height="30" rx="3" transform="rotate(-24,-17,-28)" fill="#bb9af7" opacity="0.55"/>
        </g>
      </g>
    </g>

    <!-- ── HORSE 3 — muted, far background, 58% size ── -->
    <g class="r3">
      <g transform="translate(0,136) scale(0.58)">
        <ellipse cx="0"   cy="-48" rx="40" ry="20" fill="#a9b1d6" opacity="0.3"/>
        <ellipse cx="-30" cy="-54" rx="16" ry="12" fill="#a9b1d6" opacity="0.3"/>
        <ellipse cx="22"  cy="-56" rx="13" ry="11" fill="#a9b1d6" opacity="0.3"/>
        <polygon points="16,-40 30,-38 36,-66 20,-64" fill="#a9b1d6" opacity="0.3"/>
        <ellipse cx="44" cy="-72" rx="17" ry="11" fill="#a9b1d6" opacity="0.3" transform="rotate(-15,44,-72)"/>
        <ellipse cx="58" cy="-66" rx="10" ry="7"  fill="#a9b1d6" opacity="0.25"/>
        <polygon points="34,-80 37,-91 42,-80" fill="#a9b1d6" opacity="0.3"/>
        <path d="M-42,-50 C-60,-38 -64,-22 -57,0" stroke="#a9b1d6" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.25"/>
        <g class="la">
          <rect x="8"   y="-30" width="7" height="30" rx="3" transform="rotate(-24,11,-30)"  fill="#a9b1d6" opacity="0.3"/>
          <rect x="-28" y="-28" width="7" height="30" rx="3" transform="rotate(24,-25,-28)"  fill="#a9b1d6" opacity="0.3"/>
        </g>
        <g class="lb">
          <rect x="8"   y="-30" width="7" height="30" rx="3" transform="rotate(14,11,-30)"   fill="#a9b1d6" opacity="0.3"/>
          <rect x="-28" y="-28" width="7" height="30" rx="3" transform="rotate(-14,-25,-28)" fill="#a9b1d6" opacity="0.3"/>
        </g>
      </g>
    </g>

  </g>
</svg>
